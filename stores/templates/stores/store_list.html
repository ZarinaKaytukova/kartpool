<!-- Форма фильтрации -->
<form method="get" class="mb-4">
    <div class="row">
        <div class="col-md-4">
            <select name="category" class="form-select" onchange="this.form.submit()">
                <option value="">Все категории</option>
                {% for value, label in categories %}
                    <option value="{{ value }}" {% if selected_category == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>
</form>

<!-- Карточка магазина с категорией -->
{% for store in stores %}
    <div class="card mb-3">
        <div class="card-body">
            <h5 class="card-title">{{ store.name }}</h5>
            <p class="card-text">{{ store.address }}</p>
            <p class="card-text">
                <small class="text-muted">
                    Категория: {{ store.get_category_display }}
                </small>
            </p>
        </div>
    </div>
    <div class="store-sidebar">
        <h4>Магазины поблизости</h4>
        <div id="store-list">
            <!-- Карточка магазина (пример) -->
            <div class="store-card" data-store-id="{{ store.id }}">
                <div class="store-info">
                    <h5>{{ store.name }}</h5>
                    <p>{{ store.address }}</p>
                    <span class="badge">{{ store.get_category_display }}</span>
                </div>
                <div class="store-actions">
                    <button class="favorite-btn" data-store-id="{{ store.id }}">
                        🤍
                    </button>
                </div>
            </div>
        </div>
    </div>
{% empty %}
    <p>Магазинов не найдено.</p>
{% endfor %}
